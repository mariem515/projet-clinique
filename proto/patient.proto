syntax = "proto3";

package patient;

service PatientService {
  rpc GetAllPatients (Empty) returns (PatientList);
  rpc GetPatient (PatientIdRequest) returns (Patient);
  rpc CreatePatient (CreatePatientRequest) returns (Patient);
  rpc UpdatePatient (UpdatePatientRequest) returns (Patient);
  rpc DeletePatient (PatientIdRequest) returns (DeleteResponse);
}

message Empty {}

message Patient {
  int32 id = 1;
  string nom = 2;
  string email = 3;
  string telephone = 4;
}

message PatientIdRequest {
  int32 id = 1;
}

message CreatePatientRequest {
  string nom = 1;
  string email = 2;
  string telephone = 3;
}

message UpdatePatientRequest {
  int32 id = 1;
  string nom = 2;
  string email = 3;
  string telephone = 4;
}

message PatientList {
  repeated Patient patients = 1;
}

message DeleteResponse {
  bool success = 1;
  string message = 2;
}